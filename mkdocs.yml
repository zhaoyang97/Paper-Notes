plugins:
- search:
    separator: '[\s\u200b\-\.\,\!\?\;\:\(\)\[\]\{\}\/\|]+'
    lang:
    - en
    min_search_length: 2
markdown_extensions:
- pymdownx.arithmatex:
    generic: true
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.superfences
- pymdownx.details
- pymdownx.mark
- pymdownx.critic
- pymdownx.tasklist:
    custom_checkbox: true
- admonition
- def_list
- tables
- attr_list
- md_in_html
- toc:
    permalink: true
    toc_depth: 2
extra_javascript:
- javascripts/mathjax.js
- https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js
extra_css:
- stylesheets/extra.css
