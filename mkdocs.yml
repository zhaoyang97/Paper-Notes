docs_dir: docs
site_dir: site
theme:
  name: material
  language: zh
  features:
  - navigation.instant
  - navigation.instant.progress
  - navigation.tabs
  - navigation.indexes
  - navigation.top
  - navigation.prune
  - search.suggest
  - search.highlight
  - content.code.copy
  - toc.follow
  palette:
  - media: '(prefers-color-scheme: light)'
    scheme: default
    primary: custom
    accent: deep purple
    toggle:
      icon: material/weather-sunny
      name: 切换暗色模式
  - media: '(prefers-color-scheme: dark)'
    scheme: slate
    primary: indigo
    accent: deep purple
    toggle:
      icon: material/weather-night
      name: 切换亮色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
